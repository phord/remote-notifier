name: CI

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:

jobs:
  format:
    runs-on: ubuntu-latest
    name: Format check
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check

  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint

  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test

  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm install -g @vscode/vsce
      - run: npm run package

      - name: Verify VSIX files
        run: |
          count=$(find . -name "*.vsix" | wc -l)
          echo "Found $count VSIX files"
          if [ "$count" -lt 2 ]; then
            echo "Expected at least 2 VSIX files!"
            exit 1
          fi

      - name: Prepare artifacts
        run: |
          mkdir -p dist-vsix
          find packages -name "*.vsix" -exec cp {} dist-vsix/ \;

      - name: Upload VSIX
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: remote-notifier-${{ github.ref_name }}
          path: dist-vsix/
          retention-days: 10

  release:
    name: Release & Publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    needs: [format, lint, package]

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: remote-notifier-${{ github.ref_name }}
          path: dist

      - run: npm install -g @vscode/vsce

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/**/*.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to VS Code Marketplace
        run: |
          npx @vscode/vsce publish -i "$(find dist -name "remote-notifier-*.vsix" ! -name "*router*")"
          npx @vscode/vsce publish -i "$(find dist -name "remote-notifier-router-*.vsix")"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
